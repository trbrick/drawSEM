name: Deploy coordinate-expansion to GitHub Pages (/experimental)

on:
  push:
    branches: [coordinate-expansion]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: drawsem-web/package-lock.json

      - name: Install dependencies
        working-directory: drawsem-web
        run: npm ci

      - name: Build standalone app
        working-directory: drawsem-web
        run: npx vite build --base /drawSEM/experimental/

      - name: Copy example files
        run: cp -r drawsem-web/examples drawsem-web/dist/standalone/examples

      - name: Deploy to GitHub Pages (/experimental)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: drawsem-web/dist/standalone
          destination_dir: experimental
          keep_files: true
